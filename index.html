<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benchmark Agrupadores · AR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0e0f11;--bg-card:#161719;--bg-hover:#1c1e21;
  --border:rgba(255,255,255,0.08);--border-md:rgba(255,255,255,0.15);
  --text-1:#f0f0ee;--text-2:#9a9a96;--text-3:#505050;
  --accent:#4a9eff;--accent-bg:rgba(74,158,255,0.10);
  --green:#3ecf8e;--green-bg:rgba(62,207,142,0.10);
  --red:#f87171;
  --amber:#fbbf24;
  --magenta:#D946EF;
  --font-h:'Syne',sans-serif;--font-m:'DM Mono',monospace;
}
html,body{background:var(--bg);min-height:100vh;}
body{font-family:var(--font-h);color:var(--text-1);}

/* TOP BAR */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:.875rem 2rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(14,15,17,.97);backdrop-filter:blur(14px);z-index:100;}
.top-left{display:flex;align-items:center;gap:14px;}
.bezza-logo{height:26px;width:auto;}
.div-v{width:1px;height:18px;background:var(--border-md);}
.nav-lbl{font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);}
.badge{font-family:var(--font-m);font-size:10px;padding:3px 9px;border-radius:20px;background:rgba(62,207,142,.10);color:var(--green);border:1px solid rgba(62,207,142,.2);}

/* MAIN */
.main{padding:2rem;max-width:1180px;margin:0 auto;}
.page-title{font-size:26px;font-weight:600;margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--text-2);margin-bottom:1.75rem;}

/* BRAND SELECTOR */
.selector-row{display:flex;align-items:flex-start;gap:1.5rem;margin-bottom:1.75rem;flex-wrap:wrap;}
.selector-block{display:flex;flex-direction:column;gap:8px;}
.selector-lbl{font-family:var(--font-m);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);}
.brand-btns{display:flex;flex-wrap:wrap;gap:7px;}
.bbtn{display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-2);font-family:var(--font-h);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;}
.bbtn:hover{border-color:var(--border-md);color:var(--text-1);}
.bbtn.sel-a{border-width:2px;color:var(--text-1);background:var(--bg-hover);}
.bbtn.sel-b{border-width:2px;color:var(--magenta);background:rgba(217,70,239,.08);border-color:rgba(217,70,239,.4);}
.bbtn .bdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.cmp-toggle{display:flex;align-items:center;gap:8px;padding:7px 14px;border-radius:8px;border:1px solid rgba(217,70,239,.3);background:rgba(217,70,239,.07);color:var(--magenta);font-family:var(--font-h);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;}
.cmp-toggle:hover{background:rgba(217,70,239,.14);}
.cmp-toggle.active{background:rgba(217,70,239,.18);border-color:rgba(217,70,239,.5);}
.cmp-hint{font-family:var(--font-m);font-size:10px;color:var(--text-3);}

/* CONTENT GRID */
.content{display:grid;gap:1.5rem;}
.content.compare{grid-template-columns:1fr 1fr;}

/* AGRUPADOR CARD */
.agrup-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.agrup-card.card-b{border-color:rgba(217,70,239,.3);}
.card-header{display:flex;align-items:center;gap:10px;padding:1rem 1.25rem;border-bottom:1px solid var(--border);}
.card-header .hdot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
.card-header .hname{font-size:16px;font-weight:600;}
.card-footer{padding:.75rem 1.25rem;font-family:var(--font-m);font-size:10px;color:var(--text-3);border-top:1px solid var(--border);}

/* LEVEL 1: MEDIO ACCORDION */
.acc1{border-bottom:1px solid var(--border);}
.acc1:last-of-type{border-bottom:none;}
.acc1-trigger{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1.25rem;cursor:pointer;transition:background .12s;user-select:none;}
.acc1-trigger:hover{background:var(--bg-hover);}
.acc1-trigger.open{background:rgba(255,255,255,.02);}
.acc1-name{font-size:13px;font-weight:600;color:var(--text-1);}
.acc1-arrow{font-size:10px;color:var(--text-3);transition:transform .2s;}
.acc1-trigger.open .acc1-arrow{transform:rotate(180deg);}
.acc1-body{display:none;}
.acc1-trigger.open + .acc1-body{display:block;}

/* LEVEL 2: SECTION ACCORDION (saldo / débito / crédito / cuotas) */
.acc2{border-top:1px solid var(--border);}
.acc2-trigger{display:flex;align-items:center;justify-content:space-between;padding:.625rem 1.25rem;cursor:pointer;transition:background .12s;user-select:none;}
.acc2-trigger:hover{background:var(--bg-hover);}
.acc2-trigger.open{background:rgba(255,255,255,.015);}
.acc2-name{font-size:12px;font-weight:600;}
.acc2-name.t-saldo{color:var(--green);}
.acc2-name.t-debito{color:var(--green);}
.acc2-name.t-credito{color:var(--accent);}
.acc2-name.t-cuotas{color:var(--amber);}
.acc2-arrow{font-size:9px;color:var(--text-3);transition:transform .2s;}
.acc2-trigger.open .acc2-arrow{transform:rotate(180deg);}
.acc2-body{display:none;padding:.75rem 1.25rem 1rem;}
.acc2-trigger.open + .acc2-body{display:block;}

/* PLAZO FILTER PILLS (compare mode) */
.plazo-filter{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:.75rem;}
.pfpill{font-family:var(--font-m);font-size:10px;padding:2px 9px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-3);cursor:pointer;transition:all .12s;}
.pfpill:hover{border-color:var(--border-md);color:var(--text-2);}
.pfpill.on{background:rgba(255,255,255,.06);border-color:var(--border-md);color:var(--text-1);}
.filter-hint{font-family:var(--font-m);font-size:10px;color:var(--text-3);margin-bottom:.5rem;}

/* PLAZO ROWS */
.plazo-list{display:flex;flex-direction:column;gap:5px;}
.plazo-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:7px;background:rgba(255,255,255,.03);border:1px solid transparent;}
.plazo-row.best{background:rgba(62,207,142,.07);border-color:rgba(62,207,142,.15);}
.plazo-row.saldo-row{background:rgba(62,207,142,.05);border-color:rgba(62,207,142,.12);}
.plazo-lbl{font-family:var(--font-m);font-size:12px;color:var(--text-2);}
.plazo-val{font-family:var(--font-m);font-size:14px;font-weight:500;color:var(--text-1);}
.plazo-row.best .plazo-val,.plazo-row.saldo-row .plazo-val{color:var(--green);}
.best-tag{font-family:var(--font-m);font-size:9px;padding:1px 6px;border-radius:3px;background:var(--green-bg);color:var(--green);border:1px solid rgba(62,207,142,.2);margin-left:6px;}
.iva-tag{font-family:var(--font-m);font-size:9px;color:var(--text-3);margin-left:4px;}
.nd-lbl{font-family:var(--font-m);font-size:12px;color:var(--text-3);}

/* CUOTAS TABLE */
.cuotas-table{width:100%;border-collapse:collapse;font-size:12px;}
.cuotas-table th{font-family:var(--font-m);font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--text-3);padding:6px 10px;border-bottom:1px solid var(--border);text-align:left;}
.cuotas-table th:not(:first-child){text-align:right;}
.cuotas-table td{font-family:var(--font-m);font-size:12px;padding:7px 10px;border-bottom:1px solid var(--border);color:var(--text-1);}
.cuotas-table tr:last-child td{border-bottom:none;}
.cuotas-table td:not(:first-child){text-align:right;}
.cuotas-table tr:hover td{background:var(--bg-hover);}
.plan-name{color:var(--text-2);font-size:11px;}
.tasa-val{font-weight:500;}
.tasa-best{color:var(--green);}
.msi-yes{color:var(--green);}
.msi-no{color:var(--text-3);}
.acred-val{color:var(--accent);}
.iva-sm{font-size:9px;color:var(--text-3);}

/* PLACEHOLDER */
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;color:var(--text-3);font-size:13px;gap:8px;padding:2rem;}
.ph-icon{font-size:28px;opacity:.2;}

/* COMPARE: tighter spacing */
.content.compare .acc1-trigger{padding:.75rem 1rem;}
.content.compare .acc2-trigger{padding:.5rem 1rem;}
.content.compare .acc2-body{padding:.625rem 1rem .875rem;}
.content.compare .plazo-lbl{font-size:11px;}
.content.compare .plazo-val{font-size:13px;}
.content.compare .cuotas-table td{padding:5px 8px;font-size:11px;}
.content.compare .cuotas-table th{padding:4px 8px;}

@media(max-width:820px){
  .content.compare{grid-template-columns:1fr;}
  .main{padding:1rem;}
  .top-bar{padding:.875rem 1rem;}
  .page-title{font-size:20px;}
  .selector-row{flex-direction:column;}
}
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-left">
    <img id="bezzaLogoImg" class="bezza-logo" alt="Bezza Pay">
    <div class="div-v"></div>
    <span class="nav-lbl">Benchmark agrupadores</span>
  </div>
  <span class="badge">datos reales · abr 2026</span>
</div>

<div class="main">
  <h1 class="page-title">Arancel y tasa por agrupador</h1>
  <p class="page-sub">Actualizado abril 2026</p>

  <div class="selector-row">
    <div class="selector-block">
      <div class="selector-lbl" id="selectorLbl">Seleccioná un agrupador</div>
      <div class="brand-btns" id="brandBtns"></div>
    </div>
    <div class="selector-block">
      <div class="selector-lbl">Modo comparar</div>
      <button class="cmp-toggle" id="cmpToggle" onclick="toggleCmp()">⇄ Comparar 2 agrupadores</button>
      <span class="cmp-hint" id="cmpHint" style="display:none">Seleccioná un segundo agrupador</span>
    </div>
  </div>

  <div class="content" id="content"></div>
</div>

const copyMedio=(id,from,to,removeSaldo=true)=>{
  if(!D[id][from]) return;
  D[id][to]=JSON.parse(JSON.stringify(D[id][from]));
  if(removeSaldo) delete D[id][to].saldo;

[6,3,7].forEach(id=>{copyMedio(id,'qr','link');copyMedio(id,'qr','pos');});

const MEDIOS=[{k:'qr',lbl:'QR'},{k:'link',lbl:'Link de pago'},{k:'pos',lbl:'POS / Terminal'}];

// ── STATE ──────────────────────────────────────────────────────────────────
let selA=null,selB=null,cmpMode=false;
// plazoState[cardId][medioKey][sectionKey] = Set of selected plazos
const plazoState={};

function getPlazoState(cardId,medio,section){
  if(!plazoState[cardId]) plazoState[cardId]={};
  if(!plazoState[cardId][medio]) plazoState[cardId][medio]={};
  if(!plazoState[cardId][medio][section]){
    // default: all selected
    const rows=getSectionRows(cardId,medio,section);
    plazoState[cardId][medio][section]=new Set(rows.map(r=>r.plazo));
  }
  return plazoState[cardId][medio][section];
}

function getSectionRows(brandId,medio,section){
  const d=D[brandId]&&D[brandId][medio];
  if(!d) return [];
  return d[section]||[];
}

// ── RENDER HELPERS ─────────────────────────────────────────────────────────
function plazosHTML(rows,selectedSet,showFilter){
  if(!rows||rows.length===0) return `<div class="nd-lbl">No publicado</div>`;
  const visible=showFilter?rows.filter(r=>selectedSet.has(r.plazo)):rows;
  const vals=visible.filter(r=>r.val!==null).map(r=>r.val);
  const minV=vals.length?Math.min(...vals):null;

  let html='';
  if(showFilter){
    html+=`<div class="plazo-filter">${rows.map(r=>`
      <button class="pfpill ${selectedSet.has(r.plazo)?'on':''}"
        onclick="togglePlazo(this,'${r.plazo}')">${r.plazo}</button>`).join('')}</div>`;
  }
  if(!visible.length) return html+`<div class="nd-lbl">Seleccioná al menos un plazo</div>`;
  html+=`<div class="plazo-list">${visible.map(r=>{
    const isBest=r.val!==null&&r.val===minV&&vals.length>1;
    return `<div class="plazo-row${isBest?' best':''}">
      <span class="plazo-lbl">${r.plazo}</span>
      <span class="plazo-val">${r.val!==null?r.val.toFixed(2)+'%':'—'}${isBest?'<span class="best-tag">mejor</span>':''}</span>
    </div>`;
  }).join('')}</div>`;
  return html;
}

function saldoHTML(rows,selectedSet,showFilter){
  if(!rows||rows.length===0) return '';
  const visible=showFilter?rows.filter(r=>selectedSet.has(r.plazo)):rows;
  if(!visible.length) return showFilter?`<div class="nd-lbl">Seleccioná al menos un plazo</div>`:'';
  let html='';
  if(showFilter){
    html+=`<div class="plazo-filter">${rows.map(r=>`
      <button class="pfpill ${selectedSet.has(r.plazo)?'on':''}"
        onclick="togglePlazo(this,'${r.plazo}')">${r.plazo}</button>`).join('')}</div>`;
  }
  html+=`<div class="plazo-list">${visible.map(r=>`
    <div class="plazo-row saldo-row">
      <span class="plazo-lbl" style="color:var(--green)">${r.plazo}</span>
      <span class="plazo-val">${r.val.toFixed(2)}%<span class="iva-tag">+ IVA</span></span>
    </div>`).join('')}</div>`;
  return html;
}

function cuotasTableHTML(cuotas,selectedSet,showFilter){
  if(!cuotas||cuotas.length===0) return `<div class="nd-lbl">No publicado</div>`;
  const visible=showFilter?cuotas.filter(c=>selectedSet.has(c.plan)):cuotas;
  const tasas=visible.filter(c=>!c.tna).map(c=>c.tasa);
  const minT=tasas.length?Math.min(...tasas):null;
  let html='';
  if(showFilter){
    html+=`<div class="plazo-filter">${cuotas.map(c=>`
      <button class="pfpill ${selectedSet.has(c.plan)?'on':''}"
        onclick="togglePlazo(this,'${c.plan.replace(/'/g,"\\'")}')">
        ${c.plan}</button>`).join('')}</div>`;
  }
  if(!visible.length) return html+`<div class="nd-lbl">Seleccioná al menos un plan</div>`;
  html+=`<table class="cuotas-table">
    <thead><tr><th>Plan</th><th>Tasa</th><th>Acred.</th><th>MSI</th></tr></thead>
    <tbody>${visible.map(c=>{
      const isBest=!c.tna&&c.tasa===minT&&tasas.length>1;
      const tasaTxt=c.tna?`${c.tasa}% TNA`:c.tasa.toFixed(2)+'%';
      const ivaSpan=c.iva?`<span class="iva-sm"> +IVA</span>`:'';
      const msiTxt=c.msi===true?'<span class="msi-yes">Sí</span>':c.msi===false?'<span class="msi-no">No</span>':'<span style="color:var(--text-3)">—</span>';
      const acredTxt=c.acred&&c.acred!=='—'&&c.acred!=='variable'?`<span class="acred-val">${c.acred}</span>`:`<span style="color:var(--text-3)">${c.acred||'—'}</span>`;
      return `<tr>
        <td class="plan-name">${c.plan}</td>
        <td class="tasa-val${isBest?' tasa-best':''}">${tasaTxt}${ivaSpan}</td>
        <td>${acredTxt}</td><td>${msiTxt}</td>
      </tr>`;
    }).join('')}</tbody></table>`;
  return html;
}

// ── BUILD CARD HTML ────────────────────────────────────────────────────────
function buildCard(brandId,slot){
  const b=brands.find(x=>x.id===brandId);
  const isB=slot==='b';
  let accordeons='';

  MEDIOS.forEach(m=>{
    const d=D[brandId]&&D[brandId][m.k];
    const acc1id=`acc1_${brandId}_${m.k}_${slot}`;

    if(!d){
      accordeons+=`
        <div class="acc1">
          <div class="acc1-trigger" onclick="toggleAcc1(this)">
            <span class="acc1-name">${m.lbl}</span>
            <span class="acc1-arrow">▼</span>
          </div>
          <div class="acc1-body">
            <div class="acc2">
              <div style="padding:.75rem 1.25rem" class="nd-lbl">No disponible para este medio</div>
            </div>
          </div>
        </div>`;
      return;
    }

    const sections=[
      d.saldo&&d.saldo.length?{key:'saldo',lbl:'QR · Saldo en cuenta',cls:'t-saldo'}:null,
      d.debito&&d.debito.length?{key:'debito',lbl:'Arancel débito',cls:'t-debito'}:null,
      d.credito&&d.credito.length?{key:'credito',lbl:'Arancel crédito',cls:'t-credito'}:null,
      d.cuotas!==undefined?{key:'cuotas',lbl:'Tasas de cuotas',cls:'t-cuotas'}:null,
    ].filter(Boolean);

    const sec2html=sections.map(s=>{
      const acc2id=`acc2_${brandId}_${m.k}_${s.key}_${slot}`;
      const showFilter=cmpMode;
      const ps=getPlazoState(brandId,m.k,s.key);
      let bodyContent='';
      if(s.key==='saldo') bodyContent=saldoHTML(d.saldo,ps,showFilter);
      else if(s.key==='debito') bodyContent=plazosHTML(d.debito,ps,showFilter);
      else if(s.key==='credito') bodyContent=plazosHTML(d.credito,ps,showFilter);
      else if(s.key==='cuotas'){
        // init cuotas plazoState with plan names
        if(!plazoState[brandId]||!plazoState[brandId][m.k]||!plazoState[brandId][m.k]['cuotas']){
          if(!plazoState[brandId]) plazoState[brandId]={};
          if(!plazoState[brandId][m.k]) plazoState[brandId][m.k]={};
          plazoState[brandId][m.k]['cuotas']=new Set((d.cuotas||[]).map(c=>c.plan));
        }
        bodyContent=cuotasTableHTML(d.cuotas,plazoState[brandId][m.k]['cuotas'],showFilter);
      }
      return `
        <div class="acc2" id="${acc2id}">
          <div class="acc2-trigger" onclick="toggleAcc2(this)">
            <span class="acc2-name ${s.cls}">▸ ${s.lbl}</span>
            <span class="acc2-arrow">▼</span>
          </div>
          <div class="acc2-body" data-brand="${brandId}" data-medio="${m.k}" data-section="${s.key}" data-slot="${slot}">
            ${bodyContent}
          </div>
        </div>`;
    }).join('');

    accordeons+=`
      <div class="acc1">
        <div class="acc1-trigger" onclick="toggleAcc1(this)">
          <span class="acc1-name">${m.lbl}</span>
          <span class="acc1-arrow">▼</span>
        </div>
        <div class="acc1-body">${sec2html}</div>
      </div>`;
  });

  return `<div class="agrup-card ${isB?'card-b':''}">
    <div class="card-header">
      <span class="hdot" style="background:${b.color}"></span>
      <span class="hname">${b.name}</span>
    </div>
    ${accordeons}
    <div class="card-footer">${b.nota}</div>
  </div>`;
}

// ── TOGGLE HANDLERS ────────────────────────────────────────────────────────
function toggleAcc1(trigger){trigger.classList.toggle('open');}
function toggleAcc2(trigger){trigger.classList.toggle('open');}

function togglePlazo(btn,plazo){
  const body=btn.closest('.acc2-body');
  if(!body) return;
  const brandId=parseInt(body.dataset.brand);
  const medio=body.dataset.medio;
  const section=body.dataset.section;
  const ps=getPlazoState(brandId,medio,section);
  if(ps.has(plazo)) ps.delete(plazo); else ps.add(plazo);
  btn.classList.toggle('on',ps.has(plazo));
  // Refresh just this body
  refreshSection(body,brandId,medio,section);
}

function refreshSection(body,brandId,medio,section){
  const d=D[brandId][medio];
  const ps=getPlazoState(brandId,medio,section);
  let html='';
  if(section==='saldo') html=saldoHTML(d.saldo,ps,true);
  else if(section==='debito') html=plazosHTML(d.debito,ps,true);
  else if(section==='credito') html=plazosHTML(d.credito,ps,true);
  else if(section==='cuotas') html=cuotasTableHTML(d.cuotas,ps,true);
  // Replace only the content after the pills
  const pills=body.querySelector('.plazo-filter');
  const siblings=[...body.children].filter(c=>!c.classList.contains('plazo-filter'));
  siblings.forEach(s=>s.remove());
  const tmp=document.createElement('div');
  // keep pills, append new content
  const tempDiv=document.createElement('div');
  tempDiv.innerHTML=html;
  // remove pill div from tempDiv if present
  const newPills=tempDiv.querySelector('.plazo-filter');
  if(newPills) newPills.remove();
  [...tempDiv.children].forEach(c=>body.appendChild(c));
}

// ── BRAND BUTTONS ──────────────────────────────────────────────────────────
function renderBrandBtns(){
  document.getElementById('brandBtns').innerHTML=brands.map(b=>{
    const cls=selA===b.id?'sel-a':selB===b.id?'sel-b':'';
    const bc=selA===b.id?b.color:'';
    return `<button class="bbtn ${cls}" onclick="selBrand(${b.id})" style="${bc?`border-color:${bc}`:''} ">
      <span class="bdot" style="background:${b.color}"></span>${b.name}
    </button>`;
  }).join('');
  const lbl=cmpMode
    ?(selA===null?'Seleccioná el primer agrupador':selB===null?'Seleccioná el segundo agrupador':'Comparando')
    :(selA===null?'Seleccioná un agrupador':'Agrupador seleccionado');
  document.getElementById('selectorLbl').textContent=lbl;
  document.getElementById('cmpHint').style.display=cmpMode&&selA!==null&&selB===null?'inline':'none';
}

function selBrand(id){
  if(!cmpMode){selA=id;selB=null;}
  else{
    if(selA===id){selA=selB;selB=null;}
    else if(selB===id){selB=null;}
    else if(selA===null){selA=id;}
    else if(selB===null){selB=id;}
    else{selB=id;}
  }
  renderBrandBtns();renderContent();
}

function toggleCmp(){
  cmpMode=!cmpMode;selB=null;
  document.getElementById('cmpToggle').classList.toggle('active',cmpMode);
  document.getElementById('cmpHint').style.display='none';
  renderBrandBtns();renderContent();
}

// ── RENDER CONTENT ─────────────────────────────────────────────────────────
function renderContent(){
  const el=document.getElementById('content');
  if(selA===null){
    el.className='content';
    el.innerHTML=`<div class="agrup-card"><div class="placeholder"><div class="ph-icon">↑</div>Seleccioná un agrupador para ver sus aranceles y tasas</div></div>`;
    return;
  }
  if(cmpMode&&selB!==null){
    el.className='content compare';
    el.innerHTML=buildCard(selA,'a')+buildCard(selB,'b');
  } else {
    el.className='content';
    el.innerHTML=buildCard(selA,'a');
  }
}

// ── SUPABASE CONFIG ──────────────────────────────────────────────
const SUPA_URL = 'https://czalskmvkmdqcatztzvk.supabase.co';
const SUPA_KEY = 'sb_publishable_8TSk5DbTW0lVKPHwqOIDOA_Oj_ulqa5';

async function fetchFromSupabase() {
  const headers = { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` };
  const [agrupRes, aranRes, cuotaRes, cambiosRes] = await Promise.all([
    fetch(`${SUPA_URL}/rest/v1/agrupadores?select=*&activo=eq.true&order=id`, {headers}),
    fetch(`${SUPA_URL}/rest/v1/aranceles?select=*&order=agrupador_id,medio,tipo,orden`, {headers}),
    fetch(`${SUPA_URL}/rest/v1/cuotas?select=*&order=agrupador_id,medio,orden`, {headers}),
    fetch(`${SUPA_URL}/rest/v1/cambios?select=*&visto=eq.false&order=detectado_at.desc&limit=10`, {headers}),
  ]);
  return {
    agrupadores: await agrupRes.json(),
    aranceles:   await aranRes.json(),
    cuotas:      await cuotaRes.json(),
    cambios:     await cambiosRes.json(),
  };
}

function buildDataFromSupabase(raw) {
  // Reconstruct brands array
  const brandOrder = [6,0,1,2,3,4,5,7];
  const brandMap = {};
  raw.agrupadores.forEach(a => { brandMap[a.id] = a; });
  brands.length = 0;
  brandOrder.forEach(id => {
    if (brandMap[id]) brands.push({
      id: brandMap[id].id,
      name: brandMap[id].nombre,
      color: brandMap[id].color,
      nota: brandMap[id].nota || ''
    });
  });

  // Reconstruct D object
  Object.keys(D).forEach(k => delete D[k]);
  brands.forEach(b => {
    D[b.id] = { qr:{}, link:{}, pos:{} };
    ['qr','link','pos'].forEach(m => {
      const rows = raw.aranceles.filter(r => r.agrupador_id === b.id && r.medio === m);
      D[b.id][m].saldo   = rows.filter(r=>r.tipo==='saldo'  ).map(r=>({plazo:r.plazo,val:r.valor}));
      D[b.id][m].debito  = rows.filter(r=>r.tipo==='debito' ).map(r=>({plazo:r.plazo,val:r.valor}));
      D[b.id][m].credito = rows.filter(r=>r.tipo==='credito').map(r=>({plazo:r.plazo,val:r.valor}));
      D[b.id][m].cuotas  = raw.cuotas
        .filter(c => c.agrupador_id === b.id && c.medio === m)
        .map(c => ({plan:c.plan,tasa:c.tasa,acred:c.acred,msi:c.msi,iva:c.iva,tna:c.tna||false}));
    });
  });
}

function showAlertas(cambios) {
  if (!cambios || cambios.length === 0) return;
  // Deduplicate by agrupador + campo
  const seen = new Set();
  const uniq = cambios.filter(c => {
    const k = `${c.agrupador_id}-${c.campo}`;
    if (seen.has(k)) return false;
    seen.add(k); return true;
  });

  // Build alert bar dynamically
  let alertBar = document.getElementById('alertBar');
  if (!alertBar) {
    alertBar = document.createElement('div');
    alertBar.id = 'alertBar';
    alertBar.style.cssText = 'display:none;align-items:flex-start;gap:12px;padding:.75rem 2rem;background:rgba(251,191,36,.07);border-bottom:1px solid rgba(251,191,36,.18);';
    document.querySelector('.main').before(alertBar);
  }

  const brandMap = {};
  brands.forEach(b => { brandMap[b.id] = b.name; });

  alertBar.innerHTML = `
    <div style="flex:1">
      <div style="font-size:13px;font-weight:600;color:var(--amber);margin-bottom:5px">⚠ Cambios detectados automáticamente</div>
      <ul style="list-style:none;display:flex;flex-direction:column;gap:3px">
        ${uniq.map(c => {
          const fecha = new Date(c.detectado_at).toLocaleDateString('es-AR',{day:'2-digit',month:'short'});
          return `<li style="font-family:var(--font-m);font-size:11px;color:var(--text-2)">
            · <span style="color:var(--amber)">${brandMap[c.agrupador_id]||'Agrupador'}</span>
            — ${c.campo}: ${c.valor_anterior} → ${c.valor_nuevo}
            <em style="color:var(--text-3)">(${fecha})</em>
          </li>`;
        }).join('')}
      </ul>
    </div>
    <button onclick="this.parentElement.style.display='none'" style="font-family:var(--font-m);font-size:11px;color:var(--text-3);background:none;border:none;cursor:pointer;flex-shrink:0">Cerrar ✕</button>`;
  alertBar.style.display = 'flex';
}

// ── INIT CON SUPABASE ─────────────────────────────────────────────
async function init() {
  // Show loading state
  document.getElementById('content').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;min-height:200px;color:var(--text-3);font-family:var(--font-m);font-size:12px;gap:10px">
      <span style="animation:spin 1s linear infinite;display:inline-block">◌</span> Cargando datos...
    </div>`;

  try {
    const raw = await fetchFromSupabase();
    buildDataFromSupabase(raw);
    renderBrandBtns();
    renderContent();
    showAlertas(raw.cambios);
  } catch (err) {
    console.error('Error cargando Supabase:', err);
    // Fallback: usar datos hardcodeados
    console.warn('Usando datos locales como fallback');
    renderBrandBtns();
    renderContent();
  }
}

init();
